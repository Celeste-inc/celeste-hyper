name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.14

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [linux-x64, linux-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install backend deps
        run: bun install --frozen-lockfile

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: bun run build:${{ matrix.target }}

      - name: Generate checksum
        working-directory: build
        run: sha256sum celeste-hyper-${{ matrix.target }} > celeste-hyper-${{ matrix.target }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: celeste-hyper-${{ matrix.target }}
          path: |
            build/celeste-hyper-${{ matrix.target }}
            build/celeste-hyper-${{ matrix.target }}.sha256
          retention-days: 7
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Inspect artifacts
        run: ls -lah dist/

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/celeste-hyper-linux-x64
            dist/celeste-hyper-linux-x64.sha256
            dist/celeste-hyper-linux-arm64
            dist/celeste-hyper-linux-arm64.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
