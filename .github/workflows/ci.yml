name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  BUN_VERSION: 1.3.14

jobs:
  check:
    name: Typecheck + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: UTC
      CI: "1"
      HYPER_TEST_NETWORK_BLOCK: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install backend deps
        run: bun install --frozen-lockfile

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend typecheck
        working-directory: frontend
        run: bun run typecheck

      - name: Frontend tests
        working-directory: frontend
        run: bun run test

      - name: Frontend build
        run: bun run frontend:build

      - name: Embed UI assets
        run: bun run embed:ui

      - name: Backend typecheck
        run: bun run typecheck

      - name: Backend tests
        run: bun test

  build:
    name: Build (${{ matrix.target }})
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [linux-x64, linux-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install backend deps
        run: bun install --frozen-lockfile

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: bun run build:${{ matrix.target }}

      - name: Generate checksum
        working-directory: build
        run: sha256sum celeste-hyper-${{ matrix.target }} > celeste-hyper-${{ matrix.target }}.sha256

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: celeste-hyper-${{ matrix.target }}
          path: |
            build/celeste-hyper-${{ matrix.target }}
            build/celeste-hyper-${{ matrix.target }}.sha256
          retention-days: 14
          if-no-files-found: error
