apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: default
  labels:
    app: hello-world
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: hello-world
          image: traefik/whoami:v1.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            tcpSocket: { port: 80 }
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 80 }
            periodSeconds: 15
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
          envFrom:
            - configMapRef: { name: hello-world-config, optional: true }
            - secretRef:    { name: hello-world-secret, optional: true }
